name: Publish to npm

# Publishes the package to npm with provenance whenever a GitHub Release is
# published (create a release from a tag like v0.1.0). Provenance is REQUIRED
# for n8n verified community nodes — it cryptographically links the npm package
# to this public repo and the CI run that built it.
on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          # setup-node writes .npmrc so npm publish uses NODE_AUTH_TOKEN.

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Publish (with provenance)
        # RELEASE_MODE lets the package's prepublishOnly guard (n8n-node
        # prerelease) pass — it exits 1 otherwise to block a bare npm publish.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_MODE: 'true'
